name: Tests

on:
  push:
    branches: [ main, develop, feat/environments ]
    paths:
      - 'cmd/**'
      - 'pkg/**'
      - 'test/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'cmd/**'
      - 'pkg/**'
      - 'test/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/test.yml'

jobs:
  test:
    name: Test
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest] #, windows-latest
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Download dependencies
      run: go mod download

    - name: Run tests + regenerate coverage (badge/json)
      run: make coverage

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v4
      with:
        file: ./test/coverage/coverage.out
        flags: unittests
        name: codecov-umbrella

    # Auto-commit regenerated badge/json on main only. Coverage is not bit-for-bit
    # reproducible across runners/Go versions, so we never block PRs on the diff —
    # the badge is refreshed whenever main changes.
    - name: Commit updated coverage to main
      if: matrix.os == 'ubuntu-latest' && github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        if ! git diff --quiet -- test/coverage/badge.json test/coverage/coverage.json; then
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test/coverage/badge.json test/coverage/coverage.json
          git commit -m "chore: update coverage badge [skip ci]"
          git push
        fi

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.9.0

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    # - name: Run integration tests
    #   run: go test -tags=integration ./test/integration/...

    - name: Run end-to-end tests
      run: go test -tags=e2e ./test/e2e/...
