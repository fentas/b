name: Release-please

on:
  push:
    branches: [main]
  # Manual fallback for when a merge push to main doesn't fire the push event
  # (intermittent GitHub miss) and the release PR isn't opened automatically.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Do not run on forks.
    if: github.repository == 'fentas/b'

    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.BUYO_BOT_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json
